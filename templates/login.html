<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LIGARS | IDENTITY_CHECK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050505;
            color: #00ffcc;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #111 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .login-box {
            background: rgba(10, 10, 10, 0.9);
            padding: 40px;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            width: 350px;
            text-align: center;
        }
        h2 { letter-spacing: 5px; margin-bottom: 30px; font-size: 1.2rem; color: #00ffcc; }
        label { display: block; font-size: 0.7rem; margin-bottom: 5px; text-align: left; opacity: 0.7; color: #00ffcc; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            box-sizing: border-box;
            font-family: 'Orbitron';
        }
        input:focus { border-color: #00ffcc; outline: none; }
        .btn {
            width: 100%;
            padding: 15px;
            background: #00ffcc;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            font-family: 'Orbitron';
        }
        .btn:hover { background: #fff; box-shadow: 0 0 15px #00ffcc; }
        .error { color: #ff3333; font-size: 0.7rem; margin-top: 15px; border: 1px solid #ff3333; padding: 10px; background: rgba(255,0,0,0.1); }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>LIGARS_CORE</h2>
        <form method="POST">
            <label>GEBURTSDATUM (MIN. 18 JAHRE)</label>
            <input type="date" name="bday" required>

            <label>SICHERHEITS_CODE</label>
            <input type="password" name="pw" placeholder="********" required>

            <button type="submit" class="btn">INITIALISIEREN</button>
        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
