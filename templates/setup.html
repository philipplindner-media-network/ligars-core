<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LIGARS | INITIALISIERUNG_V9</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00ffcc; --bg: #050505; --panel: #0d0d0d; --border: #1a1a1a; --danger: #ff0055; --glass: rgba(0, 255, 204, 0.05); }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }

        #loader-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(0,255,204,0.1); border-left-color: var(--cyan); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { width: 100%; max-width: 800px; background: var(--panel); border: 1px solid var(--border); padding: 30px; }
        h3 { color: var(--cyan); border-bottom: 1px solid var(--cyan); padding-bottom: 10px; margin-top: 30px; font-family: 'Orbitron'; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #aaa; }
        input, select { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px; box-sizing: border-box; }
        button { width: 100%; background: var(--cyan); color: #000; border: none; padding: 15px; margin-top: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #00ccaa; }
        .checkbox-group { display: flex; gap: 15px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--cyan);">SYSTEM_GENERATING_MASTERPLAN...</p>
    </div>

    <div class="container">
        <form action="/setup" method="POST" onsubmit="document.getElementById('loader-wrapper').style.display='flex'">

            <h3>01_BASIS_DATEN</h3>
            <div class="grid">
                <div><label>Name</label><input type="text" name="name" required></div>
                <div><label>E-Mail</label><input type="email" name="email" required></div>
                <div><label>Alter</label><input type="number" name="alter" required></div>
                <div><label>Gewicht (kg)</label><input type="number" name="gewicht" required></div>
            </div>

            <h3>02_SCHICHT_KONFIGURATION</h3>
            <div>
                <label>System</label>
                <select name="schicht_system">
                    <option value="fest">FESTE SCHICHTEN</option>
                    <option value="wechsel">WECHSELND</option>
                </select>
                <label style="margin-top:10px;">Start-Schicht</label>
                <select name="start_schicht">
                    <option value="Frühschicht">FRÜHSCHICHT</option>
                    <option value="Spätschicht">SPÄTSCHICHT</option>
                    <option value="Nachtschicht">NACHTSCHICHT</option>
                    <option value="Tagdienst">TAGDIENST / BÜRO</option>
                </select>
            </div>

            <label style="margin-top:15px;">Verfügbare Schichten im Pool (Mehrfachauswahl):</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="pool_frueh" checked> FRÜH</label>
                <label><input type="checkbox" name="pool_spaet" checked> SPÄT</label>
                <label><input type="checkbox" name="pool_nacht"> NACHT</label>
                <label><input type="checkbox" name="pool_tag"> TAG</label>
            </div>

            <h3>03_PROTOKOLL_START</h3>
            <div class="grid">
                <div>
                    <label>Aktivierungs-Protokoll</label>
                    <select name="plan">
                        {% for p in plaene %}
                        <option value="{{ p }}">{{ p }}</option>
                        {% endfor %}
                    </select>
                    <p style="font-size: 0.7rem; color: var(--cyan); margin-top: 5px; opacity: 0.7;">
                        [ SYSTEM_INFO: Protokollauswahl gemäß Sicherheitsfreigabe (Gebutrsdatum) ]
                    </p>
                </div>
                <div>
                    <label>Start-Datum (Woche 1)</label>
                    <input type="date" name="start_date" required style="color-scheme:dark;">
                </div>
            </div>

            <button type="submit">SYSTEM_INITIALISIEREN & GENERIEREN</button>
        </form>
    </div>

</body>
</html>
