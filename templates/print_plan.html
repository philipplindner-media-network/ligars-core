<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LIGARS_CORE // MASTER_PLAN_DRUCK</title>
    <style>
        body { font-family: sans-serif; padding: 20px; color: #000; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 10px; font-size: 1.5rem; }

        .wochen-container { margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: left; }
        th { background: #eee; }

        .wochen-info { background: #ddd; padding: 10px; font-weight: bold; margin-top: 20px; }

        .no-print { margin-bottom: 20px; padding: 10px; cursor: pointer; }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

    <button class="no-print" onclick="window.print()">PLAN AUSDRUCKEN</button>

    <h1>LIGARS_CORE // MASTER_PLAN: {{ proband_name }}</h1>

    {% for w_nr, info in wochen_dict.items() %}
    <div class="wochen-container">
        <div class="wochen-info">
            WOCHE {{ w_nr }}: {{ info.aufgabe }} | EVENT: {{ info.event }}
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 50px;">Woche</th>
                    <th style="width: 50px;">Tag</th>
                    <th>Befehl / Aufgabe</th>
                </tr>
            </thead>
            <tbody>
                {% for p in plaene if p.woche == w_nr %}
                <tr>
                    <td>{{ p.woche }}</td>
                    <td>{{ p.tag_nr }}</td>
                    <td>{{ p.plan_inhalt }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endfor %}

</body>
</html>
