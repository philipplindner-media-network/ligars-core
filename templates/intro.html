<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LIGARS // INITIALIZING...</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .boot-container {
            width: 80%;
            max-width: 600px;
            display: none;
        }
        .start-overlay {
            text-align: center;
            cursor: pointer;
            border: 1px solid #00ffcc;
            padding: 40px;
            background: rgba(0, 255, 204, 0.05);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .start-overlay:hover {
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
            background: rgba(0, 255, 204, 0.1);
        }
        .line {
            margin: 5px 0;
            opacity: 0;
            animation: fadeIn 0.1s forwards;
            font-size: 0.9rem;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .progress-bar {
            width: 0%;
            height: 2px;
            background: #00ffcc;
            margin-top: 20px;
            box-shadow: 0 0 10px #00ffcc;
            animation: load 3s forwards;
        }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body>

<div id="start-trigger" class="start-overlay">
    [ SYSTEM_REINITIALIZE ]<br>
    <span style="font-size: 0.6rem; opacity: 0.6;">Klicken um Kern zu starten</span>
</div>

<div id="terminal" class="boot-container"></div>

<script>
    const trigger = document.getElementById('start-trigger');
    const terminal = document.getElementById('terminal');

    const lines = [
        "> Bypassing security protocols...",
        "> Establishing neural link...",
        "> Loading LIGARS_CORE v2.5.5...",
        "> Checking Biometric sensors...",
        "> Accessing Vault encryption...",
        "> READY."
    ];

    function startBoot() {
        trigger.style.display = 'none';
        terminal.style.display = 'block';

        lines.forEach((text, i) => {
            setTimeout(() => {
                const line = document.createElement('div');
                line.className = 'line';
                line.textContent = text;
                terminal.appendChild(line);

                if (i === lines.length - 1) {
                    const bar = document.createElement('div');
                    bar.className = 'progress-bar';
                    terminal.appendChild(bar);
                    // Start des stabilen AJAX-Ladevorgangs
                    setTimeout(loadCoreSystem, 3200);
                }
            }, i * 400);
        });
    }

    async function loadCoreSystem() {
        try {
            const response = await fetch("/", {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });

            if (!response.ok) throw new Error("Network response was not ok");

            const html = await response.text();

            // Wir ersetzen den kompletten Body-Inhalt
            // Das sorgt dafür, dass das CSS der index.html (da is_ajax aktiv ist)
            // korrekt interpretiert wird.
            document.open();
            document.write(html);
            document.close();

        } catch (e) {
            console.error("Ladefehler:", e);
            window.location.href = "/"; // Fallback: Seite normal neu laden
        }
    }

    trigger.addEventListener('click', startBoot);
</script>
</body>
</html>
